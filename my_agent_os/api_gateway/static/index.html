<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent OS — Console</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root{
    --bg:#0e0e10;
    --surface:#18181b;
    --border:#27272a;
    --text:#e4e4e7;
    --text-dim:#71717a;
    --accent:#a3e635;
    --accent-dim:#4d7c0f;
    --user-bg:#1e293b;
    --agent-bg:#1c1917;
    --mem-ep:#6366f1;
    --mem-sem:#f59e0b;
    --mem-proc:#06b6d4;
    --crew-bg:#1a1a2e;
    --crew-border:#2d2d5e;
    --font-mono:'SF Mono','Cascadia Code','Fira Code','JetBrains Mono',monospace;
    --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }

  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-sans)}

  #app{display:flex;height:100vh}

  #chat-panel{
    flex:1;display:flex;flex-direction:column;
    max-width:820px;min-width:0;
    border-right:1px solid var(--border);
  }

  /* ── Auth Bar ──────────────────────────── */
  #auth-bar{
    padding:8px 24px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:8px;background:var(--surface);
    flex-shrink:0;
  }
  #auth-bar label{font-size:11px;color:var(--text-dim);font-family:var(--font-mono)}
  #auth-bar input{
    flex:1;max-width:340px;padding:5px 10px;border-radius:6px;
    border:1px solid var(--border);background:var(--bg);color:var(--text);
    font-size:12px;font-family:var(--font-mono);outline:none;
  }
  #auth-bar input:focus{border-color:var(--accent-dim)}
  #auth-bar .auth-status{
    font-size:10px;font-family:var(--font-mono);
    padding:3px 8px;border-radius:4px;
  }
  #auth-bar .auth-status.ok{color:var(--accent);border:1px solid var(--accent-dim)}
  #auth-bar .auth-status.err{color:#ef4444;border:1px solid #7f1d1d}

  header{
    padding:16px 24px 12px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:12px;flex-shrink:0;
  }
  header .logo{
    width:10px;height:10px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 8px var(--accent-dim);
  }
  header h1{font-size:14px;font-weight:600;letter-spacing:.5px;color:var(--text-dim)}
  header .hdr-actions{margin-left:auto;display:flex;gap:8px}
  header .hdr-btn{
    font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);
    background:transparent;color:var(--text-dim);cursor:pointer;
    font-family:var(--font-mono);transition:all .15s;
  }
  header .hdr-btn:hover{color:var(--accent);border-color:var(--accent-dim)}
  header .hdr-btn.active{color:var(--accent);border-color:var(--accent)}

  #messages{
    flex:1;overflow-y:auto;padding:24px;
    display:flex;flex-direction:column;gap:16px;
    scroll-behavior:smooth;
  }

  .msg{
    max-width:88%;padding:14px 18px;border-radius:12px;
    font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word;
  }
  .msg.user{
    align-self:flex-end;background:var(--user-bg);
    border:1px solid #334155;border-bottom-right-radius:4px;
  }
  .msg.agent{
    align-self:flex-start;background:var(--agent-bg);
    border:1px solid #292524;border-bottom-left-radius:4px;
  }

  .msg .label{
    font-size:11px;font-weight:600;letter-spacing:.4px;margin-bottom:6px;
    color:var(--text-dim);text-transform:uppercase;font-family:var(--font-mono);
  }
  .msg.agent .label{color:var(--accent)}
  .msg .content{color:var(--text)}

  .msg .actions{
    margin-top:12px;padding-top:10px;border-top:1px solid var(--border);
    display:flex;flex-wrap:wrap;gap:8px;
  }
  .msg .actions span{
    font-size:12px;padding:4px 10px;border-radius:6px;
    background:var(--surface);border:1px solid var(--border);
    color:var(--text-dim);font-family:var(--font-mono);
    cursor:pointer;transition:all .15s;
  }
  .msg .actions span:hover{color:var(--accent);border-color:var(--accent-dim)}

  /* ── Crew Views ────────────────────────── */
  .crew-panel{
    margin-top:12px;border-top:1px solid var(--border);padding-top:10px;
  }
  .crew-toggle{
    font-size:11px;color:var(--text-dim);cursor:pointer;
    font-family:var(--font-mono);user-select:none;
  }
  .crew-toggle:hover{color:var(--accent)}
  .crew-views{
    display:none;margin-top:8px;
    display:flex;flex-direction:column;gap:6px;
  }
  .crew-views.hidden{display:none}
  .crew-view{
    padding:8px 12px;border-radius:8px;
    background:var(--crew-bg);border:1px solid var(--crew-border);
    font-size:12px;line-height:1.6;
  }
  .crew-view .dept{
    font-size:10px;font-weight:600;color:var(--mem-ep);
    font-family:var(--font-mono);text-transform:uppercase;margin-bottom:3px;
  }

  .typing{
    align-self:flex-start;padding:14px 18px;
    display:flex;align-items:center;gap:6px;
  }
  .typing .dot{
    width:6px;height:6px;border-radius:50%;background:var(--text-dim);
    animation:blink 1.4s infinite both;
  }
  .typing .dot:nth-child(2){animation-delay:.2s}
  .typing .dot:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

  #input-bar{
    padding:16px 24px;border-top:1px solid var(--border);
    display:flex;gap:12px;flex-shrink:0;background:var(--surface);
  }
  #input-bar textarea{
    flex:1;resize:none;border:1px solid var(--border);border-radius:10px;
    background:var(--bg);color:var(--text);padding:12px 16px;
    font-family:var(--font-sans);font-size:14px;line-height:1.5;
    outline:none;transition:border-color .2s;
    min-height:46px;max-height:140px;
  }
  #input-bar textarea:focus{border-color:var(--accent-dim)}
  #input-bar textarea::placeholder{color:var(--text-dim)}

  #input-bar button{
    align-self:flex-end;padding:12px 20px;border:none;border-radius:10px;
    background:var(--accent);color:#0e0e10;font-weight:600;font-size:13px;
    cursor:pointer;transition:opacity .15s;letter-spacing:.3px;
    font-family:var(--font-sans);
  }
  #input-bar button:hover{opacity:.85}
  #input-bar button:disabled{opacity:.35;cursor:not-allowed}

  .welcome{
    flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:16px;color:var(--text-dim);text-align:center;
    padding:40px;
  }
  .welcome h2{font-size:18px;font-weight:500;color:var(--text)}
  .welcome p{font-size:13px;line-height:1.8;max-width:400px}
  .welcome kbd{
    font-family:var(--font-mono);font-size:12px;
    padding:2px 8px;border-radius:4px;
    background:var(--surface);border:1px solid var(--border);
  }

  /* ── Memory Side Panel ───────────────────── */
  #memory-panel{
    width:340px;flex-shrink:0;display:none;
    flex-direction:column;border-left:1px solid var(--border);
    background:var(--bg);overflow:hidden;
  }
  #memory-panel.open{display:flex}

  #memory-panel .panel-header{
    padding:16px 20px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
  }
  #memory-panel .panel-header h2{
    font-size:13px;font-weight:600;color:var(--text-dim);
    letter-spacing:.4px;font-family:var(--font-mono);
  }
  #memory-panel .panel-header button{
    background:none;border:none;color:var(--text-dim);
    cursor:pointer;font-size:16px;
  }

  .mem-stats{
    padding:12px 20px;border-bottom:1px solid var(--border);
    display:flex;gap:12px;
  }
  .mem-stat{
    flex:1;padding:8px;border-radius:8px;background:var(--surface);
    text-align:center;
  }
  .mem-stat .num{font-size:20px;font-weight:700;color:var(--text)}
  .mem-stat .lbl{font-size:10px;color:var(--text-dim);font-family:var(--font-mono);margin-top:2px}
  .mem-stat.ep .num{color:var(--mem-ep)}
  .mem-stat.sem .num{color:var(--mem-sem)}
  .mem-stat.proc .num{color:var(--mem-proc)}

  #memory-list{
    flex:1;overflow-y:auto;padding:12px 20px;
    display:flex;flex-direction:column;gap:10px;
  }

  .mem-card{
    padding:10px 14px;border-radius:8px;border:1px solid var(--border);
    background:var(--surface);font-size:12px;line-height:1.6;
    transition:border-color .15s;
  }
  .mem-card:hover{border-color:var(--accent-dim)}
  .mem-card .mem-type{
    font-size:10px;font-weight:600;font-family:var(--font-mono);
    letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;
  }
  .mem-card .mem-type.episodic{color:var(--mem-ep)}
  .mem-card .mem-type.semantic{color:var(--mem-sem)}
  .mem-card .mem-type.procedural{color:var(--mem-proc)}
  .mem-card .mem-text{color:var(--text);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .mem-card .mem-meta{color:var(--text-dim);font-size:10px;margin-top:6px;font-family:var(--font-mono)}
</style>
</head>
<body>
<div id="app">
  <div id="chat-panel">
    <div id="auth-bar">
      <label>API KEY</label>
      <input id="api-key-input" type="password" placeholder="os-owner-..." value="">
      <span class="auth-status" id="auth-status"></span>
    </div>

    <header>
      <div class="logo"></div>
      <h1>AGENT OS</h1>
      <div class="hdr-actions">
        <button class="hdr-btn" onclick="sealSession()">Seal Session</button>
        <button class="hdr-btn" id="mem-toggle" onclick="toggleMemory()">Memory</button>
      </div>
    </header>

    <div id="messages">
      <div class="welcome" id="welcome">
        <h2>Your Second Brain, Ready.</h2>
        <p>Enter your API Key above, then start chatting.<br>Complex tasks trigger multi-agent crew discussion automatically.</p>
        <p><kbd>Enter</kbd> send · <kbd>Shift+Enter</kbd> newline</p>
      </div>
    </div>

    <div id="input-bar">
      <textarea id="input" rows="1" placeholder="Say something..." autofocus></textarea>
      <button id="send" onclick="send()">Send</button>
    </div>
  </div>

  <div id="memory-panel">
    <div class="panel-header">
      <h2>MEMORY BANK</h2>
      <button onclick="toggleMemory()">&times;</button>
    </div>
    <div class="mem-stats">
      <div class="mem-stat ep"><div class="num" id="stat-ep">0</div><div class="lbl">EPISODIC</div></div>
      <div class="mem-stat sem"><div class="num" id="stat-sem">0</div><div class="lbl">SEMANTIC</div></div>
      <div class="mem-stat proc"><div class="num" id="stat-proc">0</div><div class="lbl">PROCEDURAL</div></div>
    </div>
    <div id="memory-list"></div>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('input');
const sendBtn    = document.getElementById('send');
const welcomeEl  = document.getElementById('welcome');
const memPanel   = document.getElementById('memory-panel');
const memToggle  = document.getElementById('mem-toggle');
const keyInput   = document.getElementById('api-key-input');
const authStatus = document.getElementById('auth-status');

const savedKey = localStorage.getItem('agent_os_api_key') || '';
keyInput.value = savedKey;
keyInput.addEventListener('change', () => {
  localStorage.setItem('agent_os_api_key', keyInput.value);
  authStatus.textContent = '';
  authStatus.className = 'auth-status';
});

function getHeaders() {
  return {
    'Content-Type': 'application/json',
    'X-API-Key': keyInput.value.trim(),
  };
}

function showAuthOk() {
  authStatus.textContent = 'OK';
  authStatus.className = 'auth-status ok';
}
function showAuthErr(msg) {
  authStatus.textContent = msg || 'DENIED';
  authStatus.className = 'auth-status err';
}

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});

function toggleMemory() {
  memPanel.classList.toggle('open');
  memToggle.classList.toggle('active');
  if (memPanel.classList.contains('open')) refreshMemory();
}

async function refreshMemory() {
  try {
    const h = getHeaders();
    const [statsRes, listRes] = await Promise.all([
      fetch('/memory/stats', { headers: h }),
      fetch('/memory/list?limit=30', { headers: h }),
    ]);
    if (!statsRes.ok || !listRes.ok) return;
    const stats = await statsRes.json();
    const memories = await listRes.json();

    document.getElementById('stat-ep').textContent = stats.episodic || 0;
    document.getElementById('stat-sem').textContent = stats.semantic || 0;
    document.getElementById('stat-proc').textContent = stats.procedural || 0;

    const listEl = document.getElementById('memory-list');
    listEl.innerHTML = '';
    memories.forEach(m => {
      const card = document.createElement('div');
      card.className = 'mem-card';
      const text = m.summary || m.content;
      card.innerHTML = `
        <div class="mem-type ${m.memory_type}">${m.memory_type}</div>
        <div class="mem-text">${escapeHtml(text)}</div>
        <div class="mem-meta">priority: ${m.priority} · accessed: ${m.access_count}x</div>
      `;
      listEl.appendChild(card);
    });
  } catch(e) { console.error('Memory refresh failed:', e); }
}

async function sealSession() {
  try {
    const res = await fetch('/memory/seal', { method: 'POST', headers: getHeaders() });
    if (res.status === 403) { showAuthErr('NO PERM'); return; }
    const data = await res.json();
    if (data.status === 'sealed') {
      appendMsg('agent', `Session sealed.\nTopic: ${data.topic || 'N/A'}\nSummary: ${data.summary || 'N/A'}`);
      if (memPanel.classList.contains('open')) refreshMemory();
    } else {
      appendMsg('agent', 'No active session to seal.');
    }
  } catch(e) { appendMsg('agent', 'Failed to seal session.'); }
}

function appendMsg(role, content, actions, crewViews) {
  if (welcomeEl) welcomeEl.remove();
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  let html = `<div class="label">${role === 'user' ? 'You' : 'Agent'}</div>`;
  html += `<div class="content">${escapeHtml(content)}</div>`;

  if (actions && actions.length) {
    html += '<div class="actions">';
    actions.forEach(a => {
      html += `<span onclick="fillInput(this.textContent)">${escapeHtml(a)}</span>`;
    });
    html += '</div>';
  }

  if (crewViews && Object.keys(crewViews).length) {
    const uid = 'crew-' + Date.now();
    html += `<div class="crew-panel">`;
    html += `<span class="crew-toggle" onclick="document.getElementById('${uid}').classList.toggle('hidden')">Department Views</span>`;
    html += `<div class="crew-views hidden" id="${uid}">`;
    for (const [dept, view] of Object.entries(crewViews)) {
      html += `<div class="crew-view"><div class="dept">${escapeHtml(dept)}</div>${escapeHtml(view)}</div>`;
    }
    html += '</div></div>';
  }

  div.innerHTML = html;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing'; div.id = 'typing';
  div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function hideTyping() { const el = document.getElementById('typing'); if (el) el.remove(); }
function fillInput(text) { inputEl.value = text; inputEl.focus(); }
function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

async function send() {
  const text = inputEl.value.trim();
  if (!text) return;
  if (!keyInput.value.trim()) { showAuthErr('NEED KEY'); return; }

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  appendMsg('user', text);
  showTyping();

  try {
    const res = await fetch('/console/query', {
      method: 'POST',
      headers: getHeaders(),
      body: JSON.stringify({ query: text, include_memory: true }),
    });
    hideTyping();

    if (res.status === 401 || res.status === 403) {
      showAuthErr(res.status === 401 ? 'NO KEY' : 'BAD KEY');
      appendMsg('agent', 'Authentication failed. Check your API key.');
      return;
    }
    if (res.status === 429) {
      appendMsg('agent', 'Rate limit exceeded. Wait a moment.');
      return;
    }
    if (!res.ok) {
      appendMsg('agent', `Request failed (${res.status}).`);
      return;
    }

    showAuthOk();
    const data = await res.json();
    appendMsg('agent', data.answer || '(no response)', data.next_actions, data.crew_views);

    setTimeout(() => {
      if (memPanel.classList.contains('open')) refreshMemory();
    }, 3000);
  } catch (err) {
    hideTyping();
    appendMsg('agent', 'Connection failed. Is the server running?');
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}
</script>
</body>
</html>
