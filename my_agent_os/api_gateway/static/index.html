<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent OS</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#212121">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Agent OS">
<link rel="apple-touch-icon" href="/icon-192.svg">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#212121;--sidebar:#171717;--surface:#2f2f2f;--surface-hi:#3a3a3a;
  --border:#404040;--border-dim:#303030;
  --text:#ececec;--text-dim:#8a8a8a;--text-muted:#5a5a5a;
  --accent:#19c37d;--accent-dim:#0d6e46;
  --mem-sem:#f59e0b;--mem-sem-bg:rgba(245,158,11,.12);
  --mem-ep:#818cf8;--mem-ep-bg:rgba(129,140,248,.12);
  --mem-proc:#22d3ee;--mem-proc-bg:rgba(34,211,238,.12);
  --user-bg:#2a2a2a;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
  --mono:'SF Mono','Cascadia Code','Consolas',monospace;
  --radius:10px;--radius-sm:6px;
  --trans:.18s ease;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.6;overflow:hidden}

/* ─── App shell ──────────────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden}

/* ─── Sidebar ────────────────────────────────────── */
#sidebar{
  width:260px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--sidebar);border-right:1px solid var(--border-dim);
  transition:width var(--trans);overflow:hidden;
}
#sidebar.collapsed{width:0;border-right:none}

.sidebar-top{padding:12px;border-bottom:1px solid var(--border-dim)}
#new-chat-btn{
  width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:transparent;color:var(--text);font-size:13px;cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:background var(--trans);
  font-family:var(--font);
}
#new-chat-btn:hover{background:var(--surface)}
#new-chat-btn svg{flex-shrink:0;opacity:.7}

#session-list{flex:1;overflow-y:auto;padding:8px}
#session-list::-webkit-scrollbar{width:4px}
#session-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.session-item{
  padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;
  font-size:12px;color:var(--text-dim);transition:all var(--trans);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;
  border:1px solid transparent;
}
.session-item:hover{background:var(--surface);color:var(--text)}
.session-item.active{background:var(--surface);color:var(--text);border-color:var(--border)}
.session-item .s-date{font-size:10px;color:var(--text-muted);margin-top:2px}

.sidebar-footer{padding:12px;border-top:1px solid var(--border-dim)}
.api-key-wrap{display:flex;flex-direction:column;gap:5px}
.api-key-wrap label{font-size:10px;color:var(--text-muted);letter-spacing:.5px;font-family:var(--mono);text-transform:uppercase}
.api-key-row{display:flex;gap:6px;align-items:center}
#api-key-input{
  flex:1;min-width:0;padding:7px 10px;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  font-family:var(--mono);font-size:11px;outline:none;transition:border-color var(--trans);
}
#api-key-input:focus{border-color:var(--accent-dim)}
#auth-dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);flex-shrink:0;transition:background var(--trans)}
#auth-dot.ok{background:var(--accent)}
#auth-dot.err{background:#ef4444}

/* ─── Chat area ──────────────────────────────────── */
#chat-area{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}

#chat-header{
  padding:14px 20px;border-bottom:1px solid var(--border-dim);
  display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--bg);
}
#sidebar-toggle{
  background:none;border:none;color:var(--text-dim);cursor:pointer;padding:4px;
  border-radius:4px;transition:color var(--trans);flex-shrink:0;
}
#sidebar-toggle:hover{color:var(--text)}
#chat-title{
  font-size:14px;font-weight:500;color:var(--text-dim);letter-spacing:.3px;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.hdr-actions{display:flex;gap:6px;flex-shrink:0}
.hdr-btn{
  padding:5px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:transparent;color:var(--text-dim);font-size:12px;cursor:pointer;
  font-family:var(--font);transition:all var(--trans);white-space:nowrap;
}
.hdr-btn:hover{background:var(--surface);color:var(--text)}
.hdr-btn.active{border-color:var(--accent);color:var(--accent)}
#force-crew-wrap{display:flex;align-items:center;gap:6px;padding:0 6px}
#force-crew-wrap label{font-size:12px;color:var(--text-dim);cursor:pointer;white-space:nowrap}
#force-crew{accent-color:var(--accent);cursor:pointer}

/* ─── Messages ───────────────────────────────────── */
#messages{
  flex:1;overflow-y:auto;padding:24px 0;
  display:flex;flex-direction:column;gap:0;
  scroll-behavior:smooth;
}
#messages::-webkit-scrollbar{width:5px}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.msg-row{
  display:flex;padding:8px 20px;gap:14px;
  transition:background var(--trans);
}
.msg-row:hover{background:rgba(255,255,255,.02)}
.msg-row.user .avatar{background:var(--accent-dim);color:#fff}
.msg-row.agent .avatar{background:#3d3d3d}

.avatar{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;margin-top:2px;
}
.msg-body{flex:1;min-width:0}
.msg-name{font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:4px}
.msg-row.user .msg-name{color:var(--accent)}
.msg-content{
  color:var(--text);font-size:14px;line-height:1.75;
  word-break:break-word;
}
.msg-content p{margin-bottom:.5em}
.msg-content p:last-child{margin-bottom:0}
.msg-content h1,.msg-content h2,.msg-content h3{margin:.6em 0 .3em;font-weight:600;color:var(--text)}
.msg-content h1{font-size:1.25em}
.msg-content h2{font-size:1.1em}
.msg-content h3{font-size:1em}
.msg-content ul,.msg-content ol{padding-left:1.4em;margin:.3em 0}
.msg-content li{margin:.15em 0}
.msg-content code{
  font-family:var(--mono);font-size:12.5px;
  background:var(--surface);padding:2px 6px;border-radius:4px;
  color:#a8c7fa;
}
.msg-content pre{
  background:#1a1a2e;border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:14px 16px;overflow-x:auto;margin:.5em 0;
}
.msg-content pre code{background:none;padding:0;color:#c9d1d9;font-size:12.5px}
.msg-content strong{font-weight:600;color:#fff}
.msg-content em{font-style:italic;color:var(--text-dim)}
.msg-content table{border-collapse:collapse;margin:.5em 0;font-size:13px;width:100%}
.msg-content th,.msg-content td{border:1px solid var(--border);padding:6px 12px;text-align:left}
.msg-content th{background:var(--surface);font-weight:600}
.msg-content a{color:#7b9cf8;text-decoration:underline}
.msg-content blockquote{border-left:3px solid var(--border);padding-left:12px;color:var(--text-dim);margin:.4em 0}
.msg-content hr{border:none;border-top:1px solid var(--border);margin:.6em 0}

.next-actions{
  display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;
}
.action-chip{
  padding:4px 12px;border-radius:20px;border:1px solid var(--border);
  font-size:12px;color:var(--text-dim);cursor:pointer;
  background:transparent;font-family:var(--font);transition:all var(--trans);
}
.action-chip:hover{border-color:var(--accent);color:var(--accent)}

.crew-panel{margin-top:12px;padding-top:10px;border-top:1px solid var(--border-dim)}
.crew-toggle{font-size:11px;color:var(--text-muted);cursor:pointer;user-select:none;transition:color var(--trans)}
.crew-toggle:hover{color:var(--text-dim)}
.crew-views{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.crew-views.hidden{display:none}
.crew-view{padding:8px 12px;border-radius:var(--radius-sm);background:#1a1a2e;border:1px solid #2d2d5e;font-size:12px;line-height:1.6}
.crew-view .dept{font-size:10px;font-weight:600;color:var(--mem-ep);font-family:var(--mono);text-transform:uppercase;margin-bottom:3px}

.typing{
  padding:8px 20px;display:flex;align-items:center;gap:14px;
}
.typing .avatar{background:#3d3d3d}
.typing-dots{display:flex;gap:4px;padding:2px 0}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:blink 1.4s infinite both}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2;transform:scale(1)}40%{opacity:1;transform:scale(1.2)}}

#welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;color:var(--text-dim);text-align:center;padding:40px;
}
#welcome h2{font-size:22px;font-weight:500;color:var(--text)}
#welcome p{font-size:13px;line-height:1.8;max-width:420px;color:var(--text-muted)}
#welcome .shortcut{font-family:var(--mono);font-size:11px;padding:2px 7px;background:var(--surface);border:1px solid var(--border);border-radius:4px}

/* ─── Input bar ──────────────────────────────────── */
#input-bar{
  padding:14px 20px;border-top:1px solid var(--border-dim);
  display:flex;align-items:flex-end;gap:10px;flex-shrink:0;background:var(--bg);
}
#input-wrap{
  flex:1;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--surface);display:flex;align-items:flex-end;gap:8px;
  padding:10px 14px;transition:border-color var(--trans);
}
#input-wrap:focus-within{border-color:var(--accent-dim)}
#input{
  flex:1;background:none;border:none;outline:none;color:var(--text);
  font-family:var(--font);font-size:14px;line-height:1.5;resize:none;
  min-height:22px;max-height:140px;
}
#input::placeholder{color:var(--text-muted)}
#voice-btn{
  width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:transparent;color:var(--text-dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all var(--trans);
}
#voice-btn:hover{border-color:var(--accent-dim);color:var(--accent)}
#voice-btn.recording{background:rgba(239,68,68,.15);border-color:#ef4444;color:#ef4444;animation:voicePulse 1s infinite}
@keyframes voicePulse{0%,100%{opacity:1}50%{opacity:.5}}
#tts-btn{
  width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:transparent;color:var(--text-dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all var(--trans);
}
#tts-btn:hover{border-color:var(--accent-dim);color:var(--accent)}
#tts-btn.speaking{color:var(--accent);border-color:var(--accent)}
#send-btn{
  width:32px;height:32px;border-radius:var(--radius-sm);border:none;
  background:var(--accent);color:#0e0e10;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:opacity var(--trans);
}
#send-btn:hover{opacity:.85}
#send-btn:disabled{opacity:.3;cursor:not-allowed}

/* ─── Memory map panel ───────────────────────────── */
#mem-panel{
  width:0;flex-shrink:0;display:flex;flex-direction:column;
  border-left:1px solid var(--border-dim);background:var(--sidebar);
  overflow:hidden;transition:width .25s ease;
}
#mem-panel.open{width:400px}

.panel-hdr{
  padding:14px 18px 10px;border-bottom:1px solid var(--border-dim);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.panel-hdr h2{font-size:12px;font-weight:600;color:var(--text-dim);letter-spacing:.5px;text-transform:uppercase;font-family:var(--mono);flex:1}
.panel-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;line-height:1;padding:2px 4px;transition:color var(--trans)}
.panel-close:hover{color:var(--text)}

.mem-legend{
  padding:8px 18px;border-bottom:1px solid var(--border-dim);
  display:flex;gap:14px;flex-shrink:0;
}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-dim)}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.mem-stats-row{
  padding:8px 18px;border-bottom:1px solid var(--border-dim);
  display:flex;gap:8px;flex-shrink:0;
}
.mem-stat-chip{
  flex:1;padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border-dim);
  text-align:center;background:var(--bg);
}
.mem-stat-chip .sn{font-size:17px;font-weight:700}
.mem-stat-chip .sl{font-size:9px;color:var(--text-muted);font-family:var(--mono);margin-top:1px}
.mem-stat-chip.sem .sn{color:var(--mem-sem)}
.mem-stat-chip.ep .sn{color:var(--mem-ep)}
.mem-stat-chip.proc .sn{color:var(--mem-proc)}

/* ─── Map canvas ─────────────────────────────────── */
#map-scroll{flex:1;overflow:auto;position:relative}
#map-scroll::-webkit-scrollbar{width:4px;height:4px}
#map-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

#map-container{
  position:relative;min-height:100%;min-width:100%;
}

/* Lane headers (track labels) */
.map-lane{
  position:absolute;left:0;right:0;display:flex;align-items:center;
  padding:0 12px;
}
.map-lane-label{
  font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
  font-family:var(--mono);opacity:.5;
}
.map-lane-line{flex:1;height:1px;margin-left:8px;opacity:.12}

/* Memory chips */
.mem-chip{
  position:absolute;cursor:pointer;
  width:136px;
  background:var(--bg);border:1px solid var(--border-dim);
  border-radius:var(--radius-sm);padding:7px 10px 6px;
  transition:border-color var(--trans),box-shadow var(--trans),transform .15s ease;
  border-left-width:3px;user-select:none;
}
.mem-chip:hover{
  border-color:var(--border);transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(0,0,0,.5);z-index:10;
}
.mem-chip.sem{border-left-color:var(--mem-sem)}
.mem-chip.ep{border-left-color:var(--mem-ep)}
.mem-chip.proc{border-left-color:var(--mem-proc)}
.mem-chip.highlighted{z-index:12}
.mem-chip.highlighted.sem{box-shadow:0 0 0 1px var(--mem-sem),0 4px 20px rgba(245,158,11,.25)}
.mem-chip.highlighted.ep{box-shadow:0 0 0 1px var(--mem-ep),0 4px 20px rgba(129,140,248,.25)}
.mem-chip.highlighted.proc{box-shadow:0 0 0 1px var(--mem-proc),0 4px 20px rgba(34,211,238,.25)}
.chip-type{font-size:9px;font-weight:600;font-family:var(--mono);letter-spacing:.4px;text-transform:uppercase;margin-bottom:3px;opacity:.75}
.chip-text{font-size:11px;color:var(--text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.chip-meta{font-size:9px;color:var(--text-muted);margin-top:4px;font-family:var(--mono)}

/* SVG connections */
#connections-svg{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;overflow:visible;
}
.conn-path{
  fill:none;stroke-width:1.5;opacity:.35;
  transition:opacity var(--trans),stroke-width var(--trans);
}
.conn-path.hovered{opacity:.75;stroke-width:2;animation:flowDash 2s linear infinite}
@keyframes flowDash{to{stroke-dashoffset:-24}}

/* Chip detail tooltip */
#chip-tooltip{
  position:fixed;z-index:100;max-width:280px;
  background:#1e1e2e;border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;box-shadow:0 8px 32px rgba(0,0,0,.6);
  pointer-events:none;opacity:0;transform:translateY(4px);
  transition:opacity .15s,transform .15s;font-size:13px;line-height:1.6;
}
#chip-tooltip.visible{opacity:1;transform:translateY(0)}
#chip-tooltip .tt-type{font-size:10px;font-family:var(--mono);text-transform:uppercase;font-weight:600;margin-bottom:6px}
#chip-tooltip .tt-content{color:var(--text);margin-bottom:6px;word-break:break-word}
#chip-tooltip .tt-entities{font-size:11px;color:var(--text-dim);font-family:var(--mono)}

/* Map empty state */
#map-empty{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  color:var(--text-muted);text-align:center;padding:30px;font-size:13px;
}
#map-empty svg{opacity:.3}

/* Chip fly-in animation */
@keyframes chipIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.chip-enter{animation:chipIn .3s ease forwards}
</style>
</head>
<body>
<div id="app">

  <!-- ── Sidebar ────────────────────────────── -->
  <aside id="sidebar">
    <div class="sidebar-top">
      <button id="new-chat-btn" onclick="newChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        New Chat
      </button>
    </div>
    <div id="session-list"></div>
    <div class="sidebar-footer">
      <div class="api-key-wrap">
        <label>API Key</label>
        <div class="api-key-row">
          <input id="api-key-input" type="password" placeholder="os-owner-…" autocomplete="off">
          <div id="auth-dot"></div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ── Chat area ──────────────────────────── -->
  <main id="chat-area">
    <header id="chat-header">
      <button id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
      </button>
      <div id="chat-title">Agent OS</div>
      <div class="hdr-actions">
        <span id="force-crew-wrap">
          <input type="checkbox" id="force-crew">
          <label for="force-crew" style="font-size:12px;color:var(--text-dim);cursor:pointer">Multi-Agent</label>
        </span>
        <button class="hdr-btn" onclick="sealSession()">Seal</button>
        <button class="hdr-btn" id="mem-toggle-btn" onclick="toggleMemPanel()">Memory Map</button>
      </div>
    </header>

    <div id="messages">
      <div id="welcome">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.25"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
        <h2>Your Second Brain, Ready.</h2>
        <p>Enter your API key, then start chatting.<br>Complex tasks route to multi-agent crew automatically.</p>
        <p><span class="shortcut">Enter</span> send &nbsp;·&nbsp; <span class="shortcut">Shift+Enter</span> newline</p>
      </div>
    </div>

    <div id="input-bar">
      <div id="input-wrap">
        <textarea id="input" rows="1" placeholder="Message Agent OS…" autofocus></textarea>
        <button id="voice-btn" onclick="toggleVoice()" title="Voice input (Whisper)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>
        </button>
        <button id="tts-btn" onclick="toggleTTS()" title="Auto-read responses aloud">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
        <button id="send-btn" onclick="send()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </main>

  <!-- ── Memory map panel ───────────────────── -->
  <aside id="mem-panel">
    <div class="panel-hdr">
      <h2>Memory Network</h2>
      <button class="panel-close" onclick="toggleMemPanel()">×</button>
    </div>

    <div class="mem-stats-row">
      <div class="mem-stat-chip sem"><div class="sn" id="stat-sem">0</div><div class="sl">SEMANTIC</div></div>
      <div class="mem-stat-chip ep"><div class="sn" id="stat-ep">0</div><div class="sl">EPISODIC</div></div>
      <div class="mem-stat-chip proc"><div class="sn" id="stat-proc">0</div><div class="sl">PROCEDURAL</div></div>
    </div>

    <div class="mem-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--mem-sem)"></div>Semantic</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--mem-ep)"></div>Episodic</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--mem-proc)"></div>Procedural</div>
    </div>

    <div id="map-scroll">
      <div id="map-container">
        <svg id="connections-svg"></svg>
        <div id="map-empty">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="9" r="3"/><circle cx="15" cy="15" r="3"/><path d="M11.5 11.5l1 1"/><circle cx="9" cy="15" r="3"/><path d="M11.5 12.5l1-1"/></svg>
          <div>No memories yet</div>
          <div style="font-size:11px;opacity:.6">Chat to build your memory network</div>
        </div>
      </div>
    </div>
  </aside>
</div>

<!-- Chip tooltip -->
<div id="chip-tooltip">
  <div class="tt-type" id="tt-type"></div>
  <div class="tt-content" id="tt-content"></div>
  <div class="tt-entities" id="tt-entities"></div>
</div>

<script>
// ── State ─────────────────────────────────────────
const STORAGE_KEY = 'agentos_sessions';
let sessions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let activeSessionId = null;
let activeMessages = [];  // [{role, content, actions, crewViews}]

// ── DOM refs ──────────────────────────────────────
const messagesEl  = document.getElementById('messages');
const inputEl     = document.getElementById('input');
const sendBtn     = document.getElementById('send-btn');
const welcomeEl   = document.getElementById('welcome');
const memPanel    = document.getElementById('mem-panel');
const memToggleBtn= document.getElementById('mem-toggle-btn');
const keyInput    = document.getElementById('api-key-input');
const authDot     = document.getElementById('auth-dot');
const sidebar     = document.getElementById('sidebar');
const sessionList = document.getElementById('session-list');

// ── Init ──────────────────────────────────────────
keyInput.value = localStorage.getItem('agentos_key') || '';
keyInput.addEventListener('input', () => {
  localStorage.setItem('agentos_key', keyInput.value);
  authDot.className = '';
});

function apiHeaders() {
  return {'Content-Type':'application/json','X-API-Key':keyInput.value.trim()};
}
function setAuth(ok) {
  authDot.className = ok ? 'ok' : 'err';
}

// ── Session management ────────────────────────────
function newChat() {
  if (activeMessages.length > 0) saveSession();
  activeSessionId = Date.now().toString();
  activeMessages = [];
  messagesEl.innerHTML = '';
  messagesEl.appendChild(welcomeEl);
  welcomeEl.style.display = 'flex';
  document.getElementById('chat-title').textContent = 'Agent OS';
  renderSessionList();
}

function saveSession() {
  if (!activeSessionId || activeMessages.length === 0) return;
  const idx = sessions.findIndex(s => s.id === activeSessionId);
  const preview = activeMessages[0]?.content?.slice(0, 50) || 'New chat';
  const item = { id: activeSessionId, preview, ts: Date.now(), messages: activeMessages };
  if (idx >= 0) sessions[idx] = item;
  else sessions.unshift(item);
  if (sessions.length > 40) sessions = sessions.slice(0, 40);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
  renderSessionList();
}

function loadSession(id) {
  if (activeMessages.length > 0) saveSession();
  const s = sessions.find(x => x.id === id);
  if (!s) return;
  activeSessionId = id;
  activeMessages = s.messages || [];
  messagesEl.innerHTML = '';
  welcomeEl.style.display = 'none';
  activeMessages.forEach(m => _renderMsg(m.role, m.content, m.actions, m.crewViews));
  document.getElementById('chat-title').textContent = s.preview || 'Agent OS';
  renderSessionList();
}

function renderSessionList() {
  sessionList.innerHTML = '';
  sessions.forEach(s => {
    const el = document.createElement('div');
    el.className = 'session-item' + (s.id === activeSessionId ? ' active' : '');
    const d = new Date(s.ts);
    el.innerHTML = `<div>${esc(s.preview)}</div><div class="s-date">${d.toLocaleDateString()}</div>`;
    el.onclick = () => loadSession(s.id);
    sessionList.appendChild(el);
  });
}

// Initialise a default session
if (!activeSessionId) {
  activeSessionId = Date.now().toString();
  if (sessions.length > 0) {
    loadSession(sessions[0].id);
  }
}
renderSessionList();

// ── UI helpers ────────────────────────────────────
function toggleSidebar() {
  sidebar.classList.toggle('collapsed');
}

function toggleMemPanel() {
  const open = memPanel.classList.toggle('open');
  memToggleBtn.classList.toggle('active', open);
  if (open) refreshMemMap();
}

async function sealSession() {
  try {
    const r = await fetch('/memory/seal', {method:'POST',headers:apiHeaders()});
    if (r.status === 403) { setAuth(false); return; }
    const d = await r.json();
    if (d.status === 'sealed') {
      appendMsg('agent', `Session sealed.\nTopic: ${d.topic||'—'}\n${d.summary||''}`, [], null);
      if (memPanel.classList.contains('open')) refreshMemMap();
    } else {
      appendMsg('agent', 'No active session to seal.', [], null);
    }
  } catch(e) { appendMsg('agent','Failed to seal session.',[], null); }
}

// ── Markdown renderer ─────────────────────────────
function renderMd(raw) {
  if (!raw) return '';
  let t = raw;

  // Fenced code blocks
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code class="lang-${esc(lang)}">${esc(code.trim())}</code></pre>`);

  // Inline code
  t = t.replace(/`([^`\n]+)`/g, (_, c) => `<code>${esc(c)}</code>`);

  // Bold / italic
  t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/__(.+?)__/g, '<strong>$1</strong>');
  t = t.replace(/_(.+?)_/g, '<em>$1</em>');

  // Headers
  t = t.replace(/^#{3}\s+(.+)$/gm, '<h3>$1</h3>');
  t = t.replace(/^#{2}\s+(.+)$/gm, '<h2>$1</h2>');
  t = t.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');

  // HR
  t = t.replace(/^---+$/gm, '<hr>');

  // Blockquote
  t = t.replace(/^>\s+(.+)$/gm, '<blockquote>$1</blockquote>');

  // Unordered lists (group consecutive li items)
  t = t.replace(/((?:^[\-\*\•]\s+.+\n?)+)/gm, match => {
    const items = match.trim().split('\n').map(l =>
      `<li>${l.replace(/^[\-\*\•]\s+/, '')}</li>`).join('');
    return `<ul>${items}</ul>`;
  });

  // Ordered lists
  t = t.replace(/((?:^\d+\.\s+.+\n?)+)/gm, match => {
    const items = match.trim().split('\n').map(l =>
      `<li>${l.replace(/^\d+\.\s+/, '')}</li>`).join('');
    return `<ol>${items}</ol>`;
  });

  // Tables (basic)
  t = t.replace(/(\|.+\|\n)+/g, match => {
    const rows = match.trim().split('\n').filter(r => !/^[\|\-\s:]+$/.test(r));
    if (rows.length === 0) return match;
    const headerRow = rows[0];
    const bodyRows = rows.slice(1);
    const th = headerRow.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    const tbody = bodyRows.map(r => {
      const tds = r.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${th}</tr></thead><tbody>${tbody}</tbody></table>`;
  });

  // Paragraphs: split by double newlines
  const parts = t.split(/\n{2,}/);
  t = parts.map(p => {
    const trimmed = p.trim();
    if (/^<(h[1-6]|ul|ol|pre|table|blockquote|hr)/.test(trimmed)) return trimmed;
    if (!trimmed) return '';
    return `<p>${trimmed.replace(/\n/g, '<br>')}</p>`;
  }).filter(Boolean).join('');

  return t;
}

// ── Message rendering ─────────────────────────────
function appendMsg(role, content, actions, crewViews) {
  welcomeEl.style.display = 'none';
  activeMessages.push({ role, content, actions: actions||[], crewViews });
  saveSession();
  _renderMsg(role, content, actions, crewViews);
}

function _renderMsg(role, content, actions, crewViews) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const initials = role === 'user' ? 'U' : 'A';
  let html = `<div class="avatar">${initials}</div><div class="msg-body">`;
  html += `<div class="msg-name">${role === 'user' ? 'You' : 'Agent OS'}</div>`;
  html += `<div class="msg-content">${role === 'agent' ? renderMd(content) : esc(content).replace(/\n/g,'<br>')}</div>`;

  if (actions && actions.length) {
    html += '<div class="next-actions">';
    actions.forEach(a => {
      html += `<button class="action-chip" onclick="fillInput(${JSON.stringify(a)})">${esc(a)}</button>`;
    });
    html += '</div>';
  }

  if (crewViews && Object.keys(crewViews).length) {
    const uid = 'c' + Date.now();
    html += `<div class="crew-panel">
      <span class="crew-toggle" onclick="document.getElementById('${uid}').classList.toggle('hidden')">▾ Department Views</span>
      <div class="crew-views hidden" id="${uid}">`;
    for (const [dept, view] of Object.entries(crewViews)) {
      html += `<div class="crew-view"><div class="dept">${esc(dept)}</div>${esc(view)}</div>`;
    }
    html += '</div></div>';
  }

  html += '</div>';
  row.innerHTML = html;
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const el = document.createElement('div');
  el.id = 'typing'; el.className = 'typing';
  el.innerHTML = `<div class="avatar" style="background:#3d3d3d">A</div>
    <div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }
function fillInput(t) { inputEl.value = t; inputEl.focus(); autoResize(); }
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Input handling ────────────────────────────────
function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
}
inputEl.addEventListener('input', autoResize);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

async function send() {
  const text = inputEl.value.trim();
  if (!text) return;
  if (!keyInput.value.trim()) { setAuth(false); return; }

  inputEl.value = ''; autoResize();
  sendBtn.disabled = true;
  appendMsg('user', text, [], null);
  showTyping();

  try {
    const r = await fetch('/console/query', {
      method:'POST',
      headers: apiHeaders(),
      body: JSON.stringify({
        query: text,
        include_memory: true,
        force_crew: document.getElementById('force-crew').checked,
      }),
    });
    hideTyping();

    if (r.status === 401 || r.status === 403) { setAuth(false); appendMsg('agent','Auth failed. Check your API key.',[], null); return; }
    if (r.status === 429) { appendMsg('agent','Rate limit — wait a moment.',[], null); return; }
    if (!r.ok) { appendMsg('agent',`Request failed (${r.status}).`,[], null); return; }

    setAuth(true);
    const d = await r.json();
    const answer = d.answer || d.brief || '(no response)';
    appendMsg('agent', answer, d.next_actions||[], d.crew_views||null);
    document.getElementById('chat-title').textContent = text.slice(0, 45) || 'Agent OS';

    if (memPanel.classList.contains('open')) {
      setTimeout(refreshMemMap, 2000);
    }
  } catch(e) {
    hideTyping();
    appendMsg('agent','Connection failed. Is the server running?',[], null);
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

// ── Memory Map ────────────────────────────────────
let memNodes = {};    // id → { x, y, w, h, type, memory }
let memEdges = [];    // [{from, to}]

const CHIP_W  = 136;
const CHIP_H  = 58;
const H_GAP   = 14;
const ROW_PAD = 22;  // padding on each side of row

async function refreshMemMap() {
  try {
    const h = apiHeaders();
    const [sRes, lRes] = await Promise.all([
      fetch('/memory/stats', {headers:h}),
      fetch('/memory/list?limit=48', {headers:h}),
    ]);
    if (!sRes.ok || !lRes.ok) return;

    const stats    = await sRes.json();
    const memories = await lRes.json();

    document.getElementById('stat-sem').textContent  = stats.semantic   || 0;
    document.getElementById('stat-ep').textContent   = stats.episodic   || 0;
    document.getElementById('stat-proc').textContent = stats.procedural || 0;

    document.getElementById('map-empty').style.display = memories.length ? 'none' : 'flex';
    renderMemMap(memories);
  } catch(e) { console.warn('Memory refresh:', e); }
}

function renderMemMap(memories) {
  const container = document.getElementById('map-container');
  const scroll    = document.getElementById('map-scroll');
  const svg       = document.getElementById('connections-svg');

  // Remove old chips (keep SVG and empty div)
  container.querySelectorAll('.mem-chip,.map-lane').forEach(el => el.remove());
  svg.innerHTML = '';

  if (!memories || !memories.length) return;

  const rows = {
    semantic:   memories.filter(m => m.memory_type === 'semantic'),
    episodic:   memories.filter(m => m.memory_type === 'episodic'),
    procedural: memories.filter(m => m.memory_type === 'procedural'),
  };

  const typeColors = { semantic: '#f59e0b', episodic: '#818cf8', procedural: '#22d3ee' };
  const typeLabels = { semantic: 'Semantic · Facts', episodic: 'Episodic · Events', procedural: 'Procedural · Patterns' };

  const ROW_GAP  = 70;
  const ROW_SPACING = CHIP_H + ROW_GAP;

  // Calculate total canvas size
  const maxChips = Math.max(...Object.values(rows).map(r => r.length), 1);
  const panelW   = scroll.clientWidth || 380;
  const contentW = Math.max(panelW, maxChips * (CHIP_W + H_GAP) + ROW_PAD * 2);
  const contentH = 3 * ROW_SPACING + ROW_PAD * 2;

  container.style.width  = contentW + 'px';
  container.style.height = contentH + 'px';
  svg.setAttribute('width',  contentW);
  svg.setAttribute('height', contentH);

  memNodes = {};

  const typeOrder = ['semantic', 'episodic', 'procedural'];
  typeOrder.forEach((type, rowIdx) => {
    const chips = rows[type];
    const rowY  = ROW_PAD + rowIdx * ROW_SPACING;
    const rowCX = rowY + CHIP_H / 2;

    // Lane label
    const lane = document.createElement('div');
    lane.className = 'map-lane';
    lane.style.top = rowY + 'px';
    lane.style.height = CHIP_H + 'px';
    lane.innerHTML = `<div class="map-lane-label" style="color:${typeColors[type]}">${typeLabels[type]}</div>
      <div class="map-lane-line" style="background:${typeColors[type]}"></div>`;
    container.appendChild(lane);

    if (!chips.length) return;

    const rowTotalW = chips.length * (CHIP_W + H_GAP) - H_GAP;
    const startX    = Math.max(ROW_PAD, (contentW - rowTotalW) / 2);

    chips.forEach((m, i) => {
      const x = startX + i * (CHIP_W + H_GAP);
      const y = rowY;

      memNodes[m.id] = { x, y, w: CHIP_W, h: CHIP_H, type, memory: m };

      const chip = document.createElement('div');
      chip.className = `mem-chip ${type} chip-enter`;
      chip.style.cssText = `left:${x}px;top:${y}px;animation-delay:${i * 40}ms`;
      chip.dataset.id = m.id;

      const text  = (m.summary || m.content || '').slice(0, 48);
      const date  = m.updated_at ? new Date(m.updated_at).toLocaleDateString() : '';
      const count = m.access_count || 0;

      chip.innerHTML = `
        <div class="chip-type" style="color:${typeColors[type]}">${type}</div>
        <div class="chip-text">${esc(text)}</div>
        <div class="chip-meta">${date}${count ? ` · ${count}×` : ''}</div>`;

      chip.addEventListener('mouseenter', e => showChipTooltip(e, m, type, typeColors[type]));
      chip.addEventListener('mouseleave', hideChipTooltip);
      chip.addEventListener('mouseover',  () => highlightConnected(m.id));
      chip.addEventListener('mouseout',   clearHighlight);

      container.appendChild(chip);
    });
  });

  // Build edges from shared entities
  memEdges = buildEdges(memories);
  drawEdges(svg, typeColors);
}

function buildEdges(memories) {
  const entityMap = {};
  memories.forEach(m => {
    (m.entities || []).forEach(e => {
      const k = e.toLowerCase().trim();
      if (!entityMap[k]) entityMap[k] = [];
      entityMap[k].push(m.id);
    });
  });

  const seen  = new Set();
  const edges = [];
  Object.values(entityMap).forEach(ids => {
    for (let i = 0; i < ids.length; i++) {
      for (let j = i + 1; j < ids.length; j++) {
        const a = ids[i], b = ids[j];
        if (!memNodes[a] || !memNodes[b]) continue;
        if (memNodes[a].type === memNodes[b].type) continue; // same-row skip
        const key = [a,b].sort().join('|');
        if (!seen.has(key)) {
          seen.add(key);
          edges.push({ from: a, to: b });
        }
      }
    }
  });
  return edges;
}

function drawEdges(svg, typeColors) {
  memEdges.forEach(({ from, to }) => {
    const a = memNodes[from];
    const b = memNodes[to];
    if (!a || !b) return;

    // Connect from bottom-center of higher chip to top-center of lower
    const [upper, lower] = a.y < b.y ? [a, b] : [b, a];
    const x1 = upper.x + upper.w / 2;
    const y1 = upper.y + upper.h;
    const x2 = lower.x + lower.w / 2;
    const y2 = lower.y;

    const dx   = x2 - x1;
    const dy   = y2 - y1;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const sag  = dist * 0.35;

    const cp1x = x1 + dx * 0.3;
    const cp1y = y1 + dy * 0.3 + sag;
    const cp2x = x1 + dx * 0.7;
    const cp2y = y1 + dy * 0.7 + sag;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${x1} ${y1} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${x2} ${y2}`);
    path.classList.add('conn-path');
    path.setAttribute('stroke', typeColors[upper.type]);
    path.setAttribute('stroke-dasharray', '5 4');
    path.dataset.from = from;
    path.dataset.to   = to;
    svg.appendChild(path);
  });
}

function highlightConnected(chipId) {
  const connectedIds = new Set([chipId]);
  memEdges.forEach(e => {
    if (e.from === chipId) connectedIds.add(e.to);
    if (e.to   === chipId) connectedIds.add(e.from);
  });

  document.querySelectorAll('.mem-chip').forEach(c => {
    c.classList.toggle('highlighted', connectedIds.has(c.dataset.id));
  });
  document.querySelectorAll('.conn-path').forEach(p => {
    const active = p.dataset.from === chipId || p.dataset.to === chipId;
    p.classList.toggle('hovered', active);
  });
}

function clearHighlight() {
  document.querySelectorAll('.mem-chip').forEach(c => c.classList.remove('highlighted'));
  document.querySelectorAll('.conn-path').forEach(p => p.classList.remove('hovered'));
}

// ── Chip tooltip ──────────────────────────────────
const tooltip  = document.getElementById('chip-tooltip');
const ttType   = document.getElementById('tt-type');
const ttContent= document.getElementById('tt-content');
const ttEnt    = document.getElementById('tt-entities');

function showChipTooltip(e, m, type, color) {
  ttType.textContent    = type.toUpperCase();
  ttType.style.color    = color;
  ttContent.textContent = m.content || '';
  ttEnt.textContent     = (m.entities||[]).length ? 'entities: ' + m.entities.join(', ') : '';

  tooltip.classList.add('visible');
  positionTooltip(e.clientX, e.clientY);
}
function hideChipTooltip() { tooltip.classList.remove('visible'); }

document.addEventListener('mousemove', e => {
  if (tooltip.classList.contains('visible')) positionTooltip(e.clientX, e.clientY);
});

function positionTooltip(cx, cy) {
  const tw = 280, th = 120;
  let x = cx + 14, y = cy + 14;
  if (x + tw > window.innerWidth  - 10) x = cx - tw - 14;
  if (y + th > window.innerHeight - 10) y = cy - th - 14;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

// Redraw map on panel resize
const resizeObs = new ResizeObserver(() => {
  if (memPanel.classList.contains('open')) refreshMemMap();
});
resizeObs.observe(document.getElementById('map-scroll'));

// ── PWA: Service Worker registration ─────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(e => console.warn('SW:', e));
}

// ── Voice: Whisper STT ────────────────────────────
let mediaRecorder = null;
let audioChunks   = [];
let ttsEnabled    = false;
let ttsAudio      = null;

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  document.getElementById('tts-btn').classList.toggle('speaking', ttsEnabled);
}

async function toggleVoice() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')
        ? 'audio/ogg;codecs=opus'
        : 'audio/webm';

    mediaRecorder = new MediaRecorder(stream, { mimeType });
    audioChunks   = [];

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop          = async () => {
      document.getElementById('voice-btn').classList.remove('recording');
      stream.getTracks().forEach(t => t.stop());

      const blob     = new Blob(audioChunks, { type: mimeType });
      const formData = new FormData();
      formData.append('file', blob, 'audio.webm');

      const sendBtnEl = document.getElementById('send-btn');
      sendBtnEl.disabled = true;
      showTyping();

      try {
        const r = await fetch('/voice/transcribe', {
          method:  'POST',
          headers: { 'X-API-Key': keyInput.value.trim() },
          body:    formData,
        });
        hideTyping();
        if (!r.ok) { appendMsg('agent', 'Voice transcription failed.', [], null); return; }
        const d = await r.json();
        if (d.text) {
          inputEl.value = d.text;
          autoResize();
          send();
        } else {
          appendMsg('agent', 'Could not transcribe audio — try again.', [], null);
        }
      } catch (e) {
        hideTyping();
        appendMsg('agent', 'Transcription error: ' + e.message, [], null);
      } finally {
        sendBtnEl.disabled = false;
      }
    };

    mediaRecorder.start();
    document.getElementById('voice-btn').classList.add('recording');
  } catch (e) {
    appendMsg('agent', 'Microphone access denied: ' + e.message, [], null);
  }
}

// ── TTS: auto-speak agent responses ──────────────
const _origSend = send;
send = async function() {
  await _origSend();
};

// Hook into appendMsg to trigger TTS when enabled
const _origAppendMsg = appendMsg;
appendMsg = function(role, content, actions, crewViews) {
  _origAppendMsg(role, content, actions, crewViews);
  if (role === 'agent' && ttsEnabled && content && keyInput.value.trim()) {
    speakText(content.replace(/[#*`>|]/g, '').slice(0, 500));
  }
};

async function speakText(text) {
  if (ttsAudio) { ttsAudio.pause(); ttsAudio = null; }
  try {
    const r = await fetch('/voice/speak', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': keyInput.value.trim() },
      body:    JSON.stringify({ text }),
    });
    if (!r.ok) return;
    const blob = await r.blob();
    const url  = URL.createObjectURL(blob);
    ttsAudio   = new Audio(url);
    ttsAudio.onended = () => URL.revokeObjectURL(url);
    ttsAudio.play();
  } catch { /* non-fatal */ }
}
</script>
